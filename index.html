<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आईना</title>
    <link rel="icon" type="image/svg+xml" href="mirror.svg">
    <link rel="stylesheet" href="styles.css?v=20260406b">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="exposure--2">
    <header class="header">
        <h1>PARTH NAIN</h1>
        <nav class="nav">
            <a href="#" class="nav-link active">CAMERA</a>
        </nav>
        <div class="exposure-dial-left" id="exposure-dial">
            <div class="dial-container">
                <div class="dial-face">
                    <div class="dial-markings">
                        <div class="dial-mark" data-value="-3">-3</div>
                        <div class="dial-mark" data-value="-2">-2</div>
                        <div class="dial-mark" data-value="-1">-1</div>
                        <div class="dial-mark" data-value="0">0</div>
                        <div class="dial-mark" data-value="1">+1</div>
                        <div class="dial-mark" data-value="2">+2</div>
                        <div class="dial-mark" data-value="3">+3</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="gallery-controls">
            <button id="globe-btn" class="zoom-btn" aria-label="Open globe explorer" title="Globe explorer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
                </svg>
            </button>
            <div class="zoom-controls">
                <button id="zoom-in-btn" class="zoom-btn">+</button>
                <button id="zoom-out-btn" class="zoom-btn">−</button>
            </div>
        </div>
    </header>

    <aside id="timeline" class="timeline-sidebar"></aside>

    <div id="country-filter-panel" class="country-filter-panel">
        <button id="country-filter-toggle" class="country-filter-toggle" type="button" aria-expanded="false" aria-label="Expand filter panel" title="Expand filter panel">
            <span class="country-filter-toggle-label">FILTER</span>
            <span id="country-filter-toggle-icon" class="country-filter-toggle-icon">+</span>
        </button>
        <div id="country-filter-body" class="country-filter-body">
            <div id="country-filter-active" class="country-filter-active">ALL</div>
            <div id="country-filter-picker" class="country-filter-picker" aria-label="Choose filter">
                <div class="country-filter-column">
                    <div class="country-filter-layer-title">type</div>
                    <div id="country-filter-kind-list" class="country-filter-list" role="listbox" aria-label="Filter type"></div>
                </div>
                <div class="country-filter-column">
                    <div id="country-filter-scope-title" class="country-filter-layer-title">countries</div>
                    <div id="country-filter-option-list" class="country-filter-list" role="listbox" aria-label="Filter options"></div>
                </div>
            </div>
            <div class="country-filter-actions">
                <button id="country-filter-apply" class="country-filter-btn">apply</button>
                <button id="country-filter-clear" class="country-filter-btn">clear</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>

        <div id="gallery-container" class="gallery-container">
            <!-- Gallery items will be dynamically inserted here -->
        </div>

        <div id="scroll-loading" class="scroll-loading hidden">
            <div class="scroll-loading-content">
                <div class="scroll-spinner"></div>
            </div>
        </div>

        <div id="error-message" class="error-message hidden">
            <p>Failed to load images. Please try again.</p>
        </div>
    </main>

    <!-- Globe Explorer overlay -->
    <div id="globe-explorer" class="globe-explorer hidden">
        <div class="globe-explorer-content">
            <div class="globe-explorer-toolbar" role="toolbar" aria-label="Globe controls">
                <button id="globe-rotate-toggle" class="globe-rotate-btn" aria-label="Pause globe rotation" title="Pause rotation">
                    <span class="globe-rotate-icon">⟳</span>
                </button>
                <button id="globe-explorer-close" class="close-btn" aria-label="Close globe explorer">&times;</button>
            </div>
            <div class="globe-explorer-scene" id="globe-explorer-scene"></div>
            <div id="globe-intersect-picker" class="globe-intersect-picker hidden" aria-label="Choose nearby location"></div>
            <div class="globe-explorer-panel" id="globe-explorer-panel">
                <div class="globe-explorer-panel-inner">
                    <div id="globe-panel-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden container for globe preloading -->
    <div id="globe-preload-container" class="globe-container hidden" style="position: absolute; top: -9999px; left: -9999px; width: 160px; height: 160px;"></div>

    <!-- Modal for fullscreen view -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-image-container">
                <img id="modal-image" src="" alt="">
            </div>
            <div class="modal-info">
                <p id="modal-description"></p>
                <div id="modal-globe" class="globe-container hidden"></div>
                <div class="modal-metadata">
                    <span id="modal-location" class="metadata-item"></span>
                    <div id="modal-camera-row" class="modal-camera-row metadata-item hidden" aria-label="Camera">
                        <span class="modal-camera-icon-wrap" aria-hidden="true">
                            <svg id="modal-camera-icon-dslr" class="modal-camera-svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            <svg id="modal-camera-icon-mobile" class="modal-camera-svg hidden" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                        </span>
                        <span id="modal-camera-name"></span>
                    </div>
                    <span id="modal-timestamp" class="metadata-item"></span>
                </div>
                <div class="modal-nav-buttons">
                    <button id="prev-btn" class="nav-btn">&lt;</button>
                    <button id="next-btn" class="nav-btn">&gt;</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=20260406b"></script>
    <script src="js/exposureDial.js?v=20260406b"></script>
    <script src="js/imageService.js?v=20260406b"></script>
    <script src="js/imagePreloader.js?v=20260406c"></script>
    <script src="js/gallery.js?v=20260406c"></script>
    <script src="js/globeService.js?v=20260406b"></script>
    <script src="js/customCalendar.js?v=20260406b"></script>
    <script src="js/timeline.js?v=20260406b"></script>
    <script src="js/modal.js?v=20260406b"></script>
    <script src="js/filmEffects.js?v=20260406b"></script>
    <script src="js/globeExplorer.js?v=20260406b"></script>
    <script src="js/app.js?v=20260406b"></script>
</body>
</html>
