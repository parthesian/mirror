<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Admin</title>
    <link rel="icon" type="image/svg+xml" href="../mirror.svg">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="exposure-0 admin-page">
    <main class="admin-shell">
        <div class="admin-panel">
            <div class="admin-panel-header">
                <div>
                    <p class="admin-eyebrow">Cloudflare Access</p>
                    <h1>Upload Photos</h1>
                </div>
                <a href="/" class="admin-back-link">Back to gallery</a>
            </div>

            <p id="admin-session-status" class="admin-session-status">Checking admin session...</p>

            <form id="upload-form" class="upload-form admin-upload-form">
                <div class="form-group">
                    <label for="photo-file">photo</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="photo-file" accept="image/*" required>
                        <div class="file-input-box">
                            <span class="file-status-icon" id="file-status-icon">✕</span>
                        </div>
                    </div>
                    <div id="file-preview" class="file-preview">
                        <div class="preview-placeholder">
                            <img id="preview-image" src="" alt="Preview">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="photo-timestamp">date</label>
                    <input type="date" id="photo-timestamp">
                </div>

                <div class="form-group">
                    <label for="photo-location">location</label>
                    <input type="text" id="photo-location" required>
                </div>

                <div class="form-group">
                    <label for="photo-country">country</label>
                    <input type="text" id="photo-country" placeholder="e.g. Japan, USA, France">
                </div>

                <div class="form-group">
                    <label for="photo-camera">camera / device</label>
                    <input type="text" id="photo-camera" placeholder="e.g. Canon EOS R5, iPhone 15 Pro">
                </div>

                <div class="form-group form-group-row">
                    <div class="form-group-half">
                        <label for="photo-latitude">latitude</label>
                        <input type="number" id="photo-latitude" step="any" min="-90" max="90" placeholder="e.g. 35.6762">
                    </div>
                    <div class="form-group-half">
                        <label for="photo-longitude">longitude</label>
                        <input type="number" id="photo-longitude" step="any" min="-180" max="180" placeholder="e.g. 139.6503">
                    </div>
                </div>

                <div class="form-group">
                    <label for="photo-description">description</label>
                    <textarea id="photo-description" rows="3"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-upload" class="btn btn-primary">upload</button>
                </div>

                <div id="upload-progress" class="upload-progress">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>

                <div id="upload-error" class="upload-error hidden">
                    <p></p>
                </div>

                <div id="upload-success" class="upload-success hidden">
                    <p></p>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/config.js?v=20260405c"></script>
    <script src="../js/imageService.js?v=20260406i"></script>
    <script src="../js/customCalendar.js?v=20260405c"></script>
    <script src="../js/adminUpload.js?v=20260406a"></script>
</body>
</html>
